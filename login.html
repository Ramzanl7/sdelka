<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Мета-данные страницы входа -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Войти - SDELKA</title>
    <link rel="preload" href="main.css" as="style">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <!-- Шапка сайта -->
    <header>
        <!-- Навигационное меню -->
        <nav>
            <!-- Логотип -->
            <img src="logo.png" alt="SDELKA" class="logo-img">
            <button class="burger-toggle" type="button" aria-label="Меню">☰</button>
            <!-- Список ссылок меню -->
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="post-request.html">Опубликовать заявку</a></li>
                <li><a href="browse-requests.html">Просмотреть заявки</a></li>
                <li><a href="my-requests.html">Мои заявки</a></li>
                <li><a href="my-offers.html">Мои отклики</a></li>
                <li><a href="login.html">Войти</a></li>
                <li><a href="register.html">Регистрация</a></li>
            </ul>
            <!-- Кнопка переключения темы -->
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Переключить тему"><i class="fas fa-moon"></i></button>
        </nav>
    </header>
    <!-- Основное содержимое -->
    <main>
        <!-- Заголовок страницы -->
        <h1>Войти</h1>
        <!-- Форма входа -->
        <form id="loginForm">
            <!-- Поле email или телефона -->
            <label for="identifier"><i class="fas fa-user"></i> Email или номер телефона</label>
            <input type="text" id="identifier" placeholder="name@example.com или +79991234567" required>

            <!-- Поле пароля -->
            <label for="password"><i class="fas fa-lock"></i> Пароль</label>
            <div class="password-field">
                <input type="password" id="password" required>
                <button type="button" class="password-toggle" aria-label="Показать пароль"><i class="fas fa-eye"></i></button>
            </div>

            <!-- Кнопка входа -->
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Войти</button>
        </form>
    </main>
    <!-- Подвал сайта -->
    <footer>
        <p>&copy; 2026 SDELKA. Все права защищены.</p>
    </footer>
    <!-- Виджет чата поддержки -->
    <div class="chat-widget">
        <!-- Кнопка открытия чата -->
        <button id="chatToggle" class="chat-toggle" type="button" aria-label="Открыть чат поддержки"><i class="fas fa-comments"></i></button>
        <!-- Окно чата -->
        <div id="chatWindow" class="chat-window" role="dialog" aria-label="Чат поддержки">
            <!-- Заголовок чата -->
            <div class="chat-header">
                <h4 id="chatTitle">Поддержка SDELKA</h4>
                <!-- Кнопки управления -->
                <div class="chat-header-buttons">
                    <button id="backToSupportBtn" type="button" aria-label="Вернуться к поддержке" style="display: none;"><i class="fas fa-arrow-left"></i></button>
                    <button id="chatClose" type="button" aria-label="Закрыть чат">&times;</button>
                </div>
            </div>
            <!-- Тело чата -->
            <div class="chat-body">
                <!-- Лог сообщений -->
                <div id="chatLog" class="chat-log"></div>
                <!-- Быстрые ответы -->
                <div id="chatQuickReplies" class="chat-quick-replies"></div>
                <!-- Инструкции для пользователя -->
                <div class="chat-instructions">Напишите ваш вопрос. Если бот не сможет помочь, он предложит оставить заявку администратору.</div>
            </div>
            <!-- Элементы управления чатом -->
            <div class="chat-controls">
                <!-- Кнопка голосового сообщения -->
                <button id="chatVoice" class="btn chat-voice-btn" type="button" aria-label="Записать голосовое сообщение">🎙️</button>
                <!-- Поле ввода сообщения -->
                <input id="chatInput" class="chat-input" type="text" placeholder="Напишите сообщение..." aria-label="Сообщение в чат">
                <!-- Кнопка отправки -->
                <button id="chatSend" class="btn chat-send" type="button">Отправить</button>
            </div>
            <!-- Секция для админских форм -->
            <div id="chatAdminSection" class="chat-admin-section"></div>
        </div>
    </div>
    <!-- Виджет чата заявки -->
    <div class="chat-widget request-chat-widget">
        <div id="requestChatWindow" class="chat-window request-chat-window" role="dialog" aria-label="Чат по заявке">
            <div class="chat-header request-chat">
                <h4 id="requestChatTitle">Чат по заявке</h4>
                <button id="requestChatClose" type="button" aria-label="Закрыть чат">&times;</button>
            </div>
            <div class="chat-body">
                <div id="requestChatLog" class="chat-log"></div>
            </div>
            <div class="chat-controls">
                <input id="requestChatInput" class="chat-input" type="text" placeholder="Напишите сообщение..." aria-label="Сообщение в чат">
                <button id="requestChatSend" class="btn chat-send" type="button">Отправить</button>
            </div>
        </div>
    </div>
    <script src="js/core.js" defer></script>
    <script src="js/support-module.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
